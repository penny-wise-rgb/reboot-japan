<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本再起動 REBOOT JAPAN</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a;
      --white: #f5f5f0;
      --red: #d62828;
      --red-dark: #a01f1f;
      --gray: #1a1a1a;
      --gray-mid: #2e2e2e;
      --gray-light: #888;
      --border: #2e2e2e;
      --panel-width: 360px;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Noto Sans JP', 'Inter', sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* HEADER */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--black);
      z-index: 200;
    }
    .logo {
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .logo span { color: var(--red); }
    .header-right { display: flex; align-items: center; gap: 1.5rem; }
    .comment-toggle-btn {
      background: var(--red);
      color: var(--white);
      border: none;
      padding: 0.5rem 1.1rem;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .comment-toggle-btn:hover { background: var(--red-dark); }
    .submit-btn {
      background: transparent;
      color: var(--white);
      border: 1px solid var(--border);
      padding: 0.5rem 1.1rem;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-decoration: none;
      white-space: nowrap;
      transition: border-color 0.2s, color 0.2s;
    }
    .submit-btn:hover { border-color: var(--red); color: var(--red); }

    /* LAYOUT */
    .layout {
      display: flex;
      transition: margin-right 0.3s ease;
    }
    .layout.panel-open { margin-right: var(--panel-width); }

    /* MAIN */
    main {
      flex: 1;
      min-width: 0;
    }

    /* HERO */
    .hero {
      padding: 5rem 3rem 3rem;
      max-width: 860px;
      margin: 0 auto;
      border-bottom: 1px solid var(--border);
    }
    .hero-eyebrow {
      font-size: 0.72rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 1.25rem;
    }
    .hero h1 {
      font-size: clamp(2.2rem, 5vw, 4.5rem);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin-bottom: 1.25rem;
    }
    .hero h1 em { font-style: normal; color: var(--red); }
    .hero-desc {
      font-size: 1rem;
      color: var(--gray-light);
      max-width: 580px;
      margin-bottom: 1.5rem;
    }
    .hero-meta { font-size: 0.78rem; color: var(--gray-light); letter-spacing: 0.05em; }
    .hero-cta {
      display: inline-block;
      margin-top: 1.5rem;
      color: var(--red);
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-decoration: none;
      border-bottom: 1px solid var(--red);
      padding-bottom: 0.1rem;
      transition: opacity 0.2s;
    }
    .hero-cta:hover { opacity: 0.7; }

    /* SLIDES */
    .slides-container {
      max-width: 860px;
      margin: 0 auto;
      padding: 3rem 3rem 5rem;
    }
    .slides-label {
      font-size: 0.72rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .slide-item {
      margin-bottom: 3rem;
    }
    .slide-number {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      color: var(--gray-light);
      margin-bottom: 0.75rem;
      text-transform: uppercase;
    }
    .slide-frame-wrapper {
      position: relative;
      width: 100%;
      padding-top: 58.5%;
      background: var(--gray);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .slide-frame-wrapper iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: calc(100% + 40px);
      border: none;
    }
    .slide-divider {
      height: 1px;
      background: var(--border);
      margin-top: 3rem;
    }

    /* COMMENT PANEL */
    .comment-panel {
      position: fixed;
      top: 0;
      right: -var(--panel-width);
      right: calc(-1 * var(--panel-width));
      width: var(--panel-width);
      height: 100vh;
      background: var(--gray);
      border-left: 1px solid var(--border);
      z-index: 150;
      display: flex;
      flex-direction: column;
      transition: right 0.3s ease;
      overflow: hidden;
    }
    .comment-panel.open { right: 0; }

    .panel-header {
      padding: 1.25rem 1.25rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      margin-top: 60px;
    }
    .panel-header h2 {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .panel-close {
      background: none;
      border: none;
      color: var(--gray-light);
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      padding: 0.2rem;
      transition: color 0.2s;
    }
    .panel-close:hover { color: var(--white); }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* COMMENT FORM */
    .comment-form {
      background: var(--black);
      border: 1px solid var(--border);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .comment-form-title {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray-light);
      margin-bottom: 0.2rem;
    }
    .comment-form input,
    .comment-form textarea {
      background: var(--gray);
      border: 1px solid var(--border);
      color: var(--white);
      padding: 0.6rem 0.8rem;
      font-family: inherit;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
      resize: vertical;
    }
    .comment-form input:focus,
    .comment-form textarea:focus { border-color: var(--red); }
    .comment-form input::placeholder,
    .comment-form textarea::placeholder { color: var(--gray-light); }
    .comment-form textarea { min-height: 80px; }
    .btn {
      background: var(--red);
      color: var(--white);
      border: none;
      padding: 0.6rem 1.1rem;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      align-self: flex-start;
    }
    .btn:hover { background: var(--red-dark); }

    /* COMMENT LIST */
    .comments-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .comment-item {
      background: var(--black);
      border: 1px solid var(--border);
      padding: 0.85rem 1rem;
    }
    .comment-header {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
      flex-wrap: wrap;
    }
    .comment-name { font-size: 0.82rem; font-weight: 700; }
    .comment-date { font-size: 0.7rem; color: var(--gray-light); }
    .comment-body { font-size: 0.85rem; color: #ccc; line-height: 1.6; }
    .reply-btn {
      background: none;
      border: none;
      color: var(--red);
      font-size: 0.72rem;
      font-family: inherit;
      cursor: pointer;
      margin-top: 0.4rem;
      padding: 0;
      letter-spacing: 0.05em;
    }
    .reply-btn:hover { text-decoration: underline; }
    .reply-form {
      margin-top: 0.6rem;
      display: none;
    }
    .reply-form.open { display: flex; flex-direction: column; gap: 0.5rem; }
    .reply-form textarea {
      background: var(--gray);
      border: 1px solid var(--border);
      color: var(--white);
      padding: 0.5rem 0.7rem;
      font-family: inherit;
      font-size: 0.82rem;
      outline: none;
      min-height: 60px;
      resize: vertical;
      width: 100%;
    }
    .reply-form textarea:focus { border-color: var(--red); }
    .replies {
      margin-top: 0.6rem;
      padding-left: 0.75rem;
      border-left: 2px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .reply-item { }
    .reply-header {
      display: flex;
      gap: 0.5rem;
      align-items: baseline;
      margin-bottom: 0.25rem;
    }
    .reply-name { font-size: 0.78rem; font-weight: 700; }
    .reply-date { font-size: 0.68rem; color: var(--gray-light); }
    .reply-body { font-size: 0.82rem; color: #bbb; line-height: 1.5; }

    .no-comments {
      font-size: 0.82rem;
      color: var(--gray-light);
      text-align: center;
      padding: 1.5rem 0;
    }

    /* FOOTER */
    footer {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 3rem;
      color: var(--gray-light);
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 600px) {
      .hero, .slides-container { padding: 2.5rem 1rem; }
      header { padding: 1rem; }
      :root { --panel-width: 100vw; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">REBOOT <span>JAPAN</span></div>
  <div class="header-right">
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSdYl5XcsuzFhtQgAY_N_0R-zaFrb8Vbrvt7yJ8NwCoDnUt2sg/viewform" target="_blank" class="submit-btn">📩 提言を投稿</a>
    <button class="comment-toggle-btn" onclick="togglePanel()">💬 コメント</button>
  </div>
</header>

<div class="layout" id="layout">
  <main>
    <section class="hero">
      <p class="hero-eyebrow">政策提言プラットフォーム</p>
      <h1>日本の<em>バグ</em>を<br>修正する</h1>
      <p class="hero-desc">制度・税制・社会の仕組みに潜む問題を、論理と数字で可視化し、具体的な改善案を提言するプラットフォームです。</p>
      <p class="hero-meta">市民による・市民のための・政策議論の場</p>
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSdYl5XcsuzFhtQgAY_N_0R-zaFrb8Vbrvt7yJ8NwCoDnUt2sg/viewform" target="_blank" class="hero-cta">あなたの提言を投稿する →</a>
    </section>

    <div class="slides-container">
      <p class="slides-label">提言 #001 ── 日本再起動（REBOOT）プラン</p>
      <div id="slidesWrapper"></div>
    </div>
  </main>
</div>

<!-- COMMENT PANEL -->
<div class="comment-panel" id="commentPanel">
  <div class="panel-header">
    <h2>コメント・議論</h2>
    <button class="panel-close" onclick="togglePanel()">✕</button>
  </div>
  <div class="panel-body">
    <div class="comment-form">
      <p class="comment-form-title">コメントを投稿</p>
      <input type="text" id="nameInput" placeholder="名前（匿名可）">
      <textarea id="commentInput" placeholder="この提言についてコメントしてください..."></textarea>
      <button class="btn" onclick="addComment()">投稿する</button>
    </div>
    <div class="comments-list" id="commentsList">
      <p class="no-comments">まだコメントはありません。最初のコメントを投稿してください。</p>
    </div>
  </div>
</div>

<footer>REBOOT JAPAN ── 市民による政策提言プラットフォーム</footer>

<script>
  const SLIDE_BASE = "https://docs.google.com/presentation/d/e/2PACX-1vRUtre1_U76N_ABHd0dek75eFVonLz0NePXY1eQaxTQyVHqo6nluE1zeyrTQeYpAVIcCENIKG7TJwXT/pubembed?start=false&loop=false&delayms=3000&slide=";
  const TOTAL_SLIDES = 13;
  const SLIDE_IDS = {
    1:  "id.p1",
    2:  "id.p2",
    3:  "id.p3",
    4:  "id.p4",
    5:  "id.p5",
    6:  "id.p6",
    7:  "id.p7",
    8:  "id.g3eaf2d0c939_0_8",
    9:  "id.g3eaf2d0c939_0_12",
    10: "id.p10",
    11: "id.p11",
    12: "id.p12",
    13: "id.p13",
  };

  // スライドを生成
  const wrapper = document.getElementById('slidesWrapper');
  for (let i = 1; i <= TOTAL_SLIDES; i++) {
    const item = document.createElement('div');
    item.className = 'slide-item';
    item.innerHTML = `
      <p class="slide-number">Slide ${i} / ${TOTAL_SLIDES}</p>
      <div class="slide-frame-wrapper">
        <iframe src="${SLIDE_BASE}${SLIDE_IDS[i]}" allowfullscreen="true" loading="lazy"></iframe>
      </div>
      ${i < TOTAL_SLIDES ? '<div class="slide-divider"></div>' : ''}
    `;
    wrapper.appendChild(item);
  }

  // パネル開閉
  let panelOpen = false;
  function togglePanel() {
    panelOpen = !panelOpen;
    document.getElementById('commentPanel').classList.toggle('open', panelOpen);
    document.getElementById('layout').classList.toggle('panel-open', panelOpen);
  }

  // コメント管理
  let comments = JSON.parse(localStorage.getItem('rj_comments') || '[]');

  function saveComments() {
    localStorage.setItem('rj_comments', JSON.stringify(comments));
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString('ja-JP', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function addComment() {
    const name = document.getElementById('nameInput').value.trim() || '匿名';
    const body = document.getElementById('commentInput').value.trim();
    if (!body) return;
    comments.unshift({ id: Date.now(), name, body, date: new Date().toISOString(), replies: [] });
    saveComments();
    renderComments();
    document.getElementById('nameInput').value = '';
    document.getElementById('commentInput').value = '';
  }

  function addReply(commentId) {
    const ta = document.getElementById(`replyText-${commentId}`);
    const body = ta.value.trim();
    if (!body) return;
    const comment = comments.find(c => c.id === commentId);
    if (!comment) return;
    comment.replies.push({ name: '匿名', body, date: new Date().toISOString() });
    saveComments();
    renderComments();
  }

  function toggleReplyForm(commentId) {
    const form = document.getElementById(`replyForm-${commentId}`);
    if (form) form.classList.toggle('open');
  }

  function renderComments() {
    const list = document.getElementById('commentsList');
    if (comments.length === 0) {
      list.innerHTML = '<p class="no-comments">まだコメントはありません。最初のコメントを投稿してください。</p>';
      return;
    }
    list.innerHTML = comments.map(c => {
      const repliesHTML = c.replies.map(r => `
        <div class="reply-item">
          <div class="reply-header">
            <span class="reply-name">${r.name}</span>
            <span class="reply-date">${formatDate(r.date)}</span>
          </div>
          <p class="reply-body">${r.body}</p>
        </div>
      `).join('');
      return `
        <div class="comment-item">
          <div class="comment-header">
            <span class="comment-name">${c.name}</span>
            <span class="comment-date">${formatDate(c.date)}</span>
          </div>
          <p class="comment-body">${c.body}</p>
          <button class="reply-btn" onclick="toggleReplyForm(${c.id})">返信する</button>
          <div class="reply-form" id="replyForm-${c.id}">
            <textarea id="replyText-${c.id}" placeholder="返信を入力..."></textarea>
            <button class="btn" style="font-size:0.72rem;padding:0.45rem 0.9rem;" onclick="addReply(${c.id})">返信する</button>
          </div>
          ${c.replies.length > 0 ? `<div class="replies">${repliesHTML}</div>` : ''}
        </div>
      `;
    }).join('');
  }

  renderComments();
</script>
</body>
</html>
